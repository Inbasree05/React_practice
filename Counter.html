<!DOCTYPE html>
<html>
<head>
  <title>Counter App</title>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
            body{
                background-color:black;
                color:blue;
                height:100vh;
                justify-content:center;
                align-items:center;
                display:flex;

            }
            .inc{
                background-color:blue;
                color:white;
                border:none;
                padding:10px 20px;
                font-size:16px;
                margin-right:10px;
                cursor:pointer;
                box-shadow: 5px 10px 10px gray;
                border-style:solid;
                border-width:2px;
                border-color:white;
                width:60px;
                height:40px;
                object-fit:cover;
                border-radius: 5px;

            }
            .dec{
                background-color:blue;
                color:white;
                border:none;
                padding:10px 20px;
                font-size:16px;
                margin-right:10px;
                cursor:pointer;
                box-shadow: 5px 10px 10px gray;
                border-style:solid;
                border-width:2px;
                border-color:white;
                width:60px;
                height:40px;
                object-fit:cover;
                border-radius: 5px;

            }
            .reset{
                background-color:blue;
                color:white;
                border:none;
                padding:10px 20px;
                font-size:16px;
                margin-right:10px;
                cursor:pointer;
                box-shadow: 5px 10px 10px gray;
                border-style:solid;
                border-width:2px;
                border-color:white;
                width:80px;
                height:40px;
                object-fit:cover;
                border-radius: 5px;

            }
            .count{
                font-size:40px;
                box-shadow:5px 10px 10px gray;
                background-color:white;
                border-radius:5px
            }
            .value{
                font-size:30px;
                box-shadow:5px 10px 10px gray;
                background-color:white;
                border-radius:5px;
                width:100px;
                text-align:center;
                margin:20px auto;

            }
        </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    function Counter(){
        const [count,setCount]=React.useState(0);
        function increment(){
            setCount(count+1);
        }
        function decrement(){
            setCount(count-1);
        }
        function reset(){
            setCount(0);
        }
    return(
        <>
        <h1 class="count">Counter App</h1>
        <p class="value">{count}</p>
        <button class="inc" onClick={increment}>+</button>
        <button class="dec" onClick={decrement}>-</button>
        <button class="reset" onClick={reset}>Reset</button> 
        </>
    )
    }
    const root = ReactDOM.createRoot(document.getElementById("root"));

    root.render(<Counter />);

  </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>React Without Install</title>

  <!-- React -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>

  <!-- React DOM -->
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    function ChatInput() {
        const [chatMessages,setchatMessages] = React.useState([{
                message:"hello,Chatbot",
                sender:"user",
                id:'1'
            },
            {
                message:"Hello,How can I help You?",
                sender:"robot",
                id:'2'
            },
            {
                message:"Can you get me todays date?",
                sender:"user",
                id:'3'
            },
            {
                message:"Today is May 16",
                sender:"robot",
                id:'4'
            },
            {
                message:"how about flip a coin",
                sender:"user",
                id:'5'
            },
            {
                message:"Sure! You got tails",
                sender:"robot",
                id:'6'
           }]);
        //    const chatMessages=array[0];
        //    const setChatMessages=array[1];
           function sendMessage(){
                // console.log("send Message");
                // chatMessageComponents.push({
                //     message:'test',
                //     sender:'user',
                //     id:crypto.randomUUID()
                // });
                // console.log(chatMessageComponents);
                setChatMessages([
                    ...chatMessages,{
                        message:'test',
                        sender:'user',
                        id:crypto.randomUUID()
                    }
                ])
           }
           const chatMessageComponents = chatMessages.map((chatmessage)=>{
            return(
                <ChatMessage 
                message={chatmessage.message}
                sender={chatmessage.sender}
                key={chatmessage.id}
                />
           );
           })
      return (
        <div>
          <input placeholder="Send a message to Chatbot" size="30"/>
          <button>Send</button>
          <button onClick={sendMessage}>Send Message</button>
          {chatMessageComponents}
        </div>
      );
    }
    const app=(
        <div>
           <ChatInput />


        </div>
    )
    function ChatMessage(props){
        const message=props.message;//shortcut: const{message,sender}=props;
        const sender=props.sender;
        /*if(sender==="user"){
            return(
                <div>
                    {message}
                    <img src="user.webp" alt="user profile" width="50"/>
                </div>
            );
        }
        return(
            <div>
                 <img src="robot.jpg" alt="user profile" width="50"/>
                {message}
            
            </div>
        )
            */
           
           return(
            <div>
                {sender==='robot' && <img src="robot.jpg" width="50"/>}
                {message}
                {sender==='user' && <img src="user.webp" width="50"/>}
            </div>
           )
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<ChatInput/>);
  </script>
</body>
</html>
